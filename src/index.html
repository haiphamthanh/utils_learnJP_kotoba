<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kotoba Engawa</title>
    <meta
      name="description"
      content="Study Japanese vocabulary from local JLPT CSV wordlists through a local Node.js server."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand__mark">言</span>
          <span>
            <strong>Kotoba Engawa</strong>
            <small>JLPT word study</small>
          </span>
        </a>

        <div class="top-stats" aria-label="Wordlist summary">
          <div>
            <span>Total</span>
            <strong data-stat="totalWords">-</strong>
          </div>
          <div>
            <span>Levels</span>
            <strong data-stat="totalLevels">-</strong>
          </div>
          <div>
            <span>Visible</span>
            <strong data-stat="visibleWords">-</strong>
          </div>
        </div>
      </header>

      <main class="study-layout">
        <aside class="tool-panel" id="study-tools">
          <div class="panel-heading">
            <p>Study Tools</p>
            <h1>単語帳</h1>
          </div>

          <label class="field">
            <span>Search</span>
            <input
              id="search-input"
              type="search"
              placeholder="語彙, ごい, vocabulary..."
              autocomplete="off"
            />
          </label>

          <section class="field">
            <span>JLPT Level</span>
            <div class="level-grid" id="level-filters"></div>
          </section>

          <section class="field">
            <span>View</span>
            <div class="segmented-control" id="study-mode">
              <button class="is-active" data-mode="flashcard" type="button">
                Card
              </button>
              <button data-mode="list" type="button">List</button>
            </div>
          </section>

          <div class="actions">
            <button id="random-btn" class="button button--primary" type="button">
              Random
            </button>
            <button id="shuffle-btn" class="button button--secondary" type="button">
              Shuffle
            </button>
          </div>
        </aside>

        <section class="focus-area" id="focus-card">
          <div class="section-heading">
            <div>
              <p>Focus Card</p>
              <h2>今日の言葉</h2>
            </div>
            <span id="card-position">-</span>
          </div>

          <article class="flashcard" id="flashcard" tabindex="0" role="button">
            <div class="flashcard__front flashcard__face">
              <span class="flashcard__label">表</span>
              <h3 id="card-expression">Đang tải...</h3>
              <p id="card-reading" class="flashcard__reading"></p>
            </div>
            <div class="flashcard__back flashcard__face">
              <span class="flashcard__label">裏</span>
              <p id="card-meaning" class="flashcard__meaning"></p>
              <div id="card-tags" class="tag-list"></div>
            </div>
          </article>

          <div class="card-actions">
            <button id="prev-btn" class="icon-button" type="button" title="Previous">
              <span aria-hidden="true">‹</span>
            </button>
            <button id="flip-btn" class="button button--primary" type="button">
              Flip
            </button>
            <button id="next-btn" class="icon-button" type="button" title="Next">
              <span aria-hidden="true">›</span>
            </button>
          </div>
        </section>

        <aside class="side-panel">
          <section class="mini-panel">
            <p class="mini-panel__label">Current Filter</p>
            <strong id="results-summary">-</strong>
          </section>
          <section class="mini-panel mini-panel--accent">
            <p class="mini-panel__label">Mode</p>
            <strong>Recall first, reveal second</strong>
          </section>
        </aside>

        <section class="word-bank" id="word-bank">
          <div class="section-heading">
            <div>
              <p>Word Bank</p>
              <h2>Vocabulary</h2>
            </div>
          </div>

          <div id="empty-state" class="empty-state" hidden>
            Không có từ nào khớp với bộ lọc hiện tại.
          </div>

          <div class="table-wrap">
            <table class="word-table" id="word-table">
              <thead>
                <tr>
                  <th>Word</th>
                  <th>Reading</th>
                  <th>Meaning</th>
                  <th>Level</th>
                </tr>
              </thead>
              <tbody id="word-table-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
